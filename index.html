<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>施工管理補助ハンドブック | Legacy</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2B4EA8">
<meta name="apple-mobile-web-app-title" content="LegacyHB">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2B4EA8;
  --blue-dk:#1e3a80;
  --yellow:#F5C418;
  --text:#1a1a2e;
  --text2:#555566;
  --text3:#999aaa;
  --bg:#f4f5f8;
  --card:#ffffff;
  --border:#e5e6ed;
  --radius:12px;
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  overflow-x:hidden;
}

/* ── HEADER (fixed) ── */
#header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  background:var(--blue);
  max-width:480px;
  margin:0 auto;
}
.hdr-inner{padding:12px 16px 10px}
.hdr-top{display:flex;align-items:center;margin-bottom:8px}
.logo{display:flex;align-items:center}
.bars{display:flex;flex-direction:column;gap:2.5px}
.bar{height:3px;width:20px;border-radius:1px}
.b1,.b3{background:#fff}.b2{background:var(--yellow)}
.logo-t{font-size:14px;font-weight:700;color:#fff;letter-spacing:.1em}
.hdr h1{font-size:15px;font-weight:700;color:#F5C418;line-height:1.35}
.hdr p{font-size:11px;color:#F5C418;opacity:.85;margin-top:2px}
.srch-wrap{background:rgba(255,255,255,.12);margin:8px 16px 0;border-radius:8px;display:flex;align-items:center;gap:8px;padding:8px 12px}
.srch-wrap svg{opacity:.6;flex-shrink:0}
.srch-wrap input{border:none;outline:none;font-size:14px;color:#fff;background:transparent;flex:1;font-family:inherit}
.srch-wrap input::placeholder{color:rgba(255,255,255,.5)}
#scnt{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap}
.nav-wrap{background:var(--blue-dk);border-top:1px solid rgba(255,255,255,.1);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px}
.nav-wrap::-webkit-scrollbar{display:none}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;color:rgba(255,255,255,.6);padding:8px 13px 7px;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;border-top:none;border-left:none;border-right:none;background:transparent;font-family:inherit}
.nb-ja{font-size:12px;font-weight:700;line-height:1.2}
.nb-id{font-size:10px;font-weight:400;line-height:1.2;opacity:.8}
.nb.on{color:#fff;border-bottom-color:var(--yellow)}
.nb.on .nb-id{opacity:1}

/* ── MAIN SCROLL AREA ── */
#main{
  max-width:480px;
  margin:0 auto;
  padding:12px 14px 40px;
  padding-top:0; /* set by JS */
}

.part-hdr{display:flex;align-items:center;gap:9px;padding:14px 0 6px}
.pbadge{color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}
.ptitle{font-size:15px;font-weight:700;color:var(--text)}
.psub{font-size:11px;color:var(--text3)}
.pdiv{height:1px;background:var(--border);margin:8px 0}

.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.sec-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-num{font-size:10px;color:var(--text3);min-width:26px;flex-shrink:0;font-weight:600}
.sec-lbl{font-size:13px;font-weight:700;color:var(--text)}
.sec-sub{font-size:10px;color:var(--text3);display:block;margin-top:1px;font-weight:400}

.row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;transition:background .12s;-webkit-user-select:none;user-select:none}
.row:last-child{border-bottom:none}
.row:active{background:#f0f2f8}
.rl{flex:1;min-width:0}
.rja{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.rkana{font-size:11px;color:var(--text3);display:block;margin-top:2px}
.rid{font-size:13px;color:var(--text2);display:block;margin-top:3px;line-height:1.35}
.rarr{font-size:18px;color:var(--text3);flex-shrink:0}
.prow{flex-direction:column;align-items:flex-start;gap:3px}
.pja{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.pid{font-size:13px;color:var(--text2);line-height:1.4}
.parr{align-self:flex-end;font-size:12px;color:var(--text3)}
.brow{gap:12px}
.bicon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.bname-ja{font-size:14px;font-weight:700;color:var(--text)}
.bname-id{font-size:12px;color:var(--text2);margin-top:2px}
.hl{background:#ffe066;color:#1a2f6a;border-radius:2px;padding:0 2px}
.empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:14px;line-height:1.8}

/* ── MODAL ── */
#modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,20,40,.55);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
}
#modal-bg.show{display:flex}
#modal-box{
  background:#fff;
  border-radius:16px;
  width:100%;
  max-width:440px;
  max-height:82vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:pop .18s ease;
}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.m-hdr{padding:18px 16px 14px;border-bottom:1px solid #eee;position:relative;flex-shrink:0;background:#fff}
.m-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  border:1px solid #dde;background:#f4f5f8;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#777;font-family:inherit;line-height:1
}
.m-ja{font-size:21px;font-weight:800;color:var(--text);line-height:1.25;padding-right:40px}
.m-kana{font-size:13px;color:var(--text3);margin-top:4px;font-weight:400}
.m-id{font-size:16px;color:var(--blue);font-weight:700;margin-top:6px}
.m-body{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;background:#fff;-webkit-overflow-scrolling:touch}
.m-label{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.m-val{font-size:14px;color:var(--text);line-height:1.75}
.m-val-ja{color:var(--text2);font-size:13px;line-height:1.7;padding-bottom:2px}
.m-ex{background:#f4f5f8;border-radius:10px;padding:13px 14px;border-left:3px solid var(--blue)}
.m-ex-ja{font-size:14px;color:var(--text);line-height:1.5;font-style:italic;font-weight:500}
.m-ex-id{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.pcell{border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.3;border:1.5px solid transparent;font-weight:500}
</style>
</head>

      {ja:'足をくじく',kana:'あしをくじく',id:'Keseleo'},
      {ja:'一輪車',kana:'いちりんしゃ',id:'Kendaraan satu roda'},
      {ja:'支柱',kana:'しちゅう',id:'tiang'},
      {ja:'ショベル',kana:'しょべる',id:'Alat keruk, ekskavator'},
      {ja:'かけや',kana:'かけや',id:'Palu besar'}
    ]}

  ,{id:'p5',color:'#0d47a1',
   label:{ja:'安全掲示板',id:'Papan Pengumuman Keselamatan'},
   sections:[
    {id:'1-7',label:{ja:'安全掲示板の見方',id:'Cara Membaca Papan Pengumuman Keselamatan'},type:'bulletin',items:[
      {ja:'今月の安全目標',kana:'こんげつのあんぜんもくひょう',id:'Target keselamatan bulan ini',color:'#1B5E20',emoji:'🎯',panels:['今月の安全目標'],
       detail:{ja:'毎月設定される現場全体の安全目標。朝礼で全員に周知される。「飛来落下物災害防止」「墜落・転落の災害防止」などが典型的な目標。',id:'Target keselamatan lapangan yang ditetapkan setiap bulan. Diumumkan ke semua orang saat apel pagi. Contoh: "Mencegah benda jatuh", "Mencegah kecelakaan jatuh".'},
       example:{ja:'「今月の安全目標は何ですか？」と朝礼で確認する。',id:'Konfirmasi "Apa target keselamatan bulan ini?" saat apel pagi.'}},
      {ja:'無災害記録表',kana:'むさいがいきろくひょう',id:'Tabel catatan tanpa kecelakaan',color:'#1a237e',emoji:'📅',panels:['無災害記録表'],
       detail:{ja:'現場で無災害が続いた日数・時間を記録する表。「目標時間○時間・経過時間○時間」と記載される。日数が増えることで全員のモチベーションが上がる。',id:'Tabel yang mencatat hari dan jam tanpa kecelakaan. Tercantum "Target ○ jam, Telah berlalu ○ jam". Bertambahnya hari menjadi motivasi semua pekerja.'},
       example:{ja:'「今日で無災害○○日達成です」と朝礼で発表される。',id:'"Hari ini mencapai ○○ hari tanpa kecelakaan" diumumkan di apel pagi.'}},
      {ja:'安全施工サイクル',kana:'あんぜんせこうさいくる',id:'Siklus konstruksi aman harian',color:'#e65100',emoji:'🔄',panels:['安全施工サイクル'],
       detail:{ja:'①安全朝礼→②安全ミーティング→③作業前点検→④安全パトロール→⑤作業中の指揮監督→⑥安全工程打合せ→⑦持場後片付け→⑧終了時の安全確認。',id:'①Apel pagi→②Safety meeting→③Cek sebelum kerja→④Patroli→⑤Pengawasan→⑥Rapat progres→⑦Bersih-bersih→⑧Cek akhir.'},
       example:{ja:'毎日このサイクルを繰り返すことで現場の安全が保たれる。',id:'Dengan mengulang siklus ini setiap hari, keselamatan lapangan terjaga.'}},
      {ja:'玉掛けワイヤーロープ点検',kana:'たまかけわいやーろーぷてんけん',id:'Inspeksi tali kawat pengait kren',color:'#4a148c',emoji:'🔍',panels:['玉掛けワイヤー点検'],
       detail:{ja:'クレーンで荷を吊る際に使うワイヤーロープの月次点検記録。素線切れ・腐食・変形・キンク・摩耗などを確認する。「今月の点検色は○○色」と掲示板に記載される。',id:'Catatan inspeksi bulanan tali kawat kren. Cek putusnya kawat, korosi, deformasi, kink, keausan. "Warna inspeksi bulan ini adalah ○○" tercantum di papan.'},
       example:{ja:'点検色シールが貼られているワイヤーのみ使用できる。',id:'Hanya kawat dengan stiker warna inspeksi yang boleh digunakan.'}},
      {ja:'建設業の許可票',kana:'けんせつぎょうのきょかひょう',id:'Papan izin usaha konstruksi',color:'#0d47a1',emoji:'📋',panels:['建設業許可票'],
       detail:{ja:'建設業法で現場への掲示が義務。会社名・代表者名・許可番号・許可年月日・許可業種が記載される。現場事務所の見やすい場所に設置。',id:'Diwajibkan UU Konstruksi untuk dipasang di lapangan. Tercantum nama perusahaan, direktur, nomor izin, tanggal izin, jenis izin. Dipasang di tempat mudah terlihat.'},
       example:{ja:'許可票がない現場は建設業法違反になる。',id:'Lapangan tanpa papan izin melanggar UU Konstruksi.'}},
      {ja:'労災保険関係成立票',kana:'ろうさいほけんかんけいせいりつひょう',id:'Papan kepesertaan asuransi kecelakaan kerja',color:'#006064',emoji:'🏥',panels:['労災保険成立票'],
       detail:{ja:'労災保険への加入証明。現場入口付近への掲示が義務。事故発生時にこの保険から治療費・補償が支払われる。',id:'Bukti kepesertaan asuransi kecelakaan kerja. Wajib dipasang di dekat pintu masuk. Biaya pengobatan dan kompensasi dibayar dari asuransi ini saat kecelakaan.'},
       example:{ja:'万が一事故が起きた場合、すぐに上司に報告し労災申請を行う。',id:'Jika terjadi kecelakaan, segera lapor atasan dan ajukan klaim asuransi.'}},
      {ja:'有資格者・作業主任者一覧表',kana:'ゆうしかくしゃ・さぎょうしゅにんしゃいちらんひょう',id:'Daftar pemegang sertifikat & penanggung jawab',color:'#1B5E20',emoji:'👷',panels:['有資格者一覧表'],
       detail:{ja:'足場組立・玉掛け・クレーン操作など危険作業は有資格者のみ実施可能。作業主任者は法令で選任義務あり、作業者に直接指揮を行う。',id:'Pekerjaan berbahaya seperti perancah, pengaitan, kren hanya boleh dilakukan pemegang sertifikat. Penanggung jawab kerja wajib ditunjuk hukum.'},
       example:{ja:'「この作業の担当主任者は誰ですか？」と必ず確認する。',id:'Selalu konfirmasi "Siapa penanggung jawab untuk pekerjaan ini?"'}},
      {ja:'3-3-3運動（玉掛けの基本）',kana:'さんさんさんうんどう',id:'Gerakan 3-3-3 (aturan dasar pengaitan)',color:'#b71c1c',emoji:'⚠️',panels:['3-3-3運動'],
       detail:{ja:'①玉掛け者が3点以上確認②クレーン操縦者が3点以上確認③吊り荷の3m以内に立ち入らない。吊り荷の下には絶対に入らないこと。',id:'①Penggantung konfirmasi 3 poin ke atas ②Operator kren konfirmasi 3 poin ke atas ③Jangan masuk dalam 3m dari beban. Jangan pernah masuk ke bawah beban yang diangkat.'},
       example:{ja:'吊り荷の下や3m以内には絶対に立ち入らない。',id:'Jangan sekali-kali masuk ke bawah atau dalam 3m dari beban yang diangkat.'}}
    ]}
  ]}
  ,{id:'p6',color:'#534AB7',
   label:{ja:'現場での会話集',id:'Percakapan di Lapangan'},
   sections:[
    {id:'4-1',label:{ja:'確認・質問の表現',id:'Ekspresi Konfirmasi & Bertanya'},type:'phrases',items:[
      {ja:'すみません、もう一度お願いします。',kana:'すみません、もういちどおねがいします。',id:'Maaf, mohon ulangi sekali lagi.',
       detail:{ja:'聞き取れなかった・理解できなかったときに使う。安全確認のための質問は恥ずかしいことではない。',id:'Digunakan saat tidak mendengar atau tidak mengerti. Bertanya untuk konfirmasi keselamatan bukan hal yang memalukan.'},
       example:{ja:'わからないまま作業するのは最も危険。必ず確認すること。',id:'Bekerja tanpa mengerti adalah yang paling berbahaya. Selalu konfirmasi.'}},
      {ja:'これでいいですか？',kana:'これでいいですか？',id:'Apakah ini sudah benar?',
       detail:{ja:'作業途中・完了時に上司に確認を取るときの表現。積極的に使うと「仕事ができる人」という印象になる。',id:'Ekspresi meminta konfirmasi atasan di tengah atau setelah pekerjaan. Sering digunakan memberi kesan pekerja yang kompeten.'},
       example:{ja:'確認を怠ると手戻りが発生する。積極的に確認しよう。',id:'Jika tidak konfirmasi, pekerjaan bisa terulang. Aktif lah berkonfirmasi.'}},
      {ja:'わかりました。',kana:'わかりました。',id:'Saya mengerti. / Baik.',
       detail:{ja:'指示を理解したときに使う返事。本当に理解したときだけ使い、わからない場合は「もう一度お願いします」と言うこと。',id:'Jawaban saat memahami instruksi. Gunakan hanya saat benar-benar mengerti. Jika tidak, katakan "Mohon ulangi sekali lagi".'},
       example:{ja:'「では、この作業をお願いします。」「わかりました。」',id:'"Tolong kerjakan ini." "Saya mengerti."'}},
      {ja:'少し待ってください。',kana:'すこしまってください。',id:'Tolong tunggu sebentar.',
       detail:{ja:'準備が必要なとき・確認が必要なときに使う。急かされても安全確認は省略しないこと。',id:'Digunakan saat perlu persiapan atau konfirmasi. Walau didesak, jangan lewati pengecekan keselamatan.'},
       example:{ja:'安全確認中に使う。急いでいても省略しない。',id:'Digunakan saat pengecekan keselamatan. Jangan dilewati meski terburu-buru.'}}
    ]},
    {id:'4-2',label:{ja:'緊急時の表現',id:'Ekspresi Keadaan Darurat'},type:'phrases',items:[
      {ja:'助けてください！',kana:'たすけてください！',id:'Tolong! Minta bantuan!',
       detail:{ja:'緊急事態のときに叫ぶ言葉。大きな声で叫ぶこと。周囲の人に伝わることが最優先。',id:'Kata yang diteriakkan saat keadaan darurat. Teriaklah dengan suara keras. Prioritas utama menyampaikan ke orang sekitar.'},
       example:{ja:'周囲の人に助けを求めるときに使う。',id:'Digunakan saat meminta bantuan orang di sekitar.'}},
      {ja:'ケガをしました。',kana:'けがをしました。',id:'Saya cedera / terluka.',
       detail:{ja:'自分または他者がケガをしたことを報告する。小さなケガでも必ず上司に報告し労災処理を行うこと。',id:'Melaporkan diri sendiri atau orang lain yang cedera. Laporkan ke atasan meski cedera kecil dan proses asuransi kecelakaan.'},
       example:{ja:'小さなケガでも必ず報告すること。',id:'Laporkan meski cedera kecil.'}},
      {ja:'救急車を呼んでください。',kana:'きゅうきゅうしゃをよんでください。',id:'Tolong panggil ambulans.',
       detail:{ja:'重傷者が出た場合。119番に電話。「火事ですか、救急ですか？」→「救急です」→住所・状況・人数を伝える。',id:'Saat ada yang luka parah. Telepon 119. "Kebakaran atau darurat medis?" → "Darurat medis" → Sampaikan alamat, situasi, jumlah orang.'},
       example:{ja:'119番：「救急です。○○で工事現場の事故です。」',id:'119: "Darurat medis. Kecelakaan di lokasi konstruksi di ○○."'}},
      {ja:'火事です！',kana:'かじです！',id:'Kebakaran!',
       detail:{ja:'火災発生時に叫ぶ言葉。119番に連絡し、消火器で初期消火を試みる。煙が充満する前に避難すること。',id:'Diteriakkan saat terjadi kebakaran. Hubungi 119, coba padamkan dengan alat pemadam. Evakuasi sebelum asap memenuhi ruangan.'},
       example:{ja:'「火事です！逃げてください！」',id:'"Kebakaran! Tolong mengungsi!"'}},
      {ja:'気分が悪いです。',kana:'きぶんがわるいです。',id:'Saya tidak enak badan.',
       detail:{ja:'体調不良・熱中症の疑いがある場合に使う。すぐに作業を止めて日陰で休むこと。水分補給をすること。',id:'Digunakan saat merasa tidak enak badan atau diduga heat stroke. Segera hentikan pekerjaan dan istirahat di tempat teduh. Minum air.'},
       example:{ja:'「気分が悪いので少し休ませてください。」',id:'"Saya tidak enak badan, boleh istirahat sebentar?"'}}
    ]},
    {id:'4-3',label:{ja:'朝礼・指示を受ける',id:'Apel Pagi & Menerima Instruksi'},type:'phrases',items:[
      {ja:'はい、わかりました。',kana:'はい、わかりました。',id:'Ya, saya mengerti.',
       detail:{ja:'指示を受けたときの基本の返事。元気よく返事することが大切。',id:'Jawaban dasar saat menerima instruksi. Penting untuk menjawab dengan semangat.'},
       example:{ja:'「今日はこの作業をお願いします。」「はい、わかりました。」',id:'"Tolong kerjakan ini hari ini." "Ya, saya mengerti."'}},
      {ja:'何時から始めますか？',kana:'なんじからはじめますか？',id:'Mulai jam berapa?',
       detail:{ja:'作業開始時間を確認するときの表現。',id:'Ekspresi untuk mengkonfirmasi waktu mulai pekerjaan.'},
       example:{ja:'「作業は何時から始めますか？」',id:'"Pekerjaan mulai jam berapa?"'}},
      {ja:'どこで作業しますか？',kana:'どこでさぎょうしますか？',id:'Di mana tempat kerjanya?',
       detail:{ja:'作業場所を確認するときの表現。現場は広いので必ず確認すること。',id:'Ekspresi untuk mengkonfirmasi lokasi kerja. Lapangan luas jadi selalu konfirmasi.'},
       example:{ja:'「今日の作業場所はどこですか？」',id:'"Di mana lokasi kerja hari ini?"'}}
    ]},
    {id:'4-4',label:{ja:'工具・材料を頼む',id:'Meminta Alat & Material'},type:'phrases',items:[
      {ja:'○○をとってください。',kana:'○○をとってください。',id:'Tolong ambilkan ○○.',
       detail:{ja:'工具や材料を取ってほしいときに使う。○○に工具名・材料名を入れる。',id:'Digunakan saat ingin meminta alat atau material diambilkan. Isi ○○ dengan nama alat/material.'},
       example:{ja:'「ヘルメットをとってください。」',id:'"Tolong ambilkan helmnya."'}},
      {ja:'もっと持ってきてください。',kana:'もっともってきてください。',id:'Tolong bawa lebih banyak lagi.',
       detail:{ja:'材料が足りないときに追加を頼む表現。',id:'Ekspresi meminta tambahan saat material kurang.'},
       example:{ja:'「鉄筋をもっと持ってきてください。」',id:'"Tolong bawa lebih banyak tulangan besi."'}}
    ]}
  ]}
  ,{id:'p7',color:'#3B6D11',
   label:{ja:'日本での生活ガイド',id:'Panduan Hidup di Jepang'},
   sections:[
    {id:'5-1',label:{ja:'市役所・区役所',id:'Kantor Kota / Kelurahan (Shiyakusho)'},type:'facility',items:[
      {ja:'転入届',kana:'てんにゅうとどけ',id:'Pendaftaran pindah masuk (tennyuu-todoke)',
       detail:{ja:'引越し後14日以内に手続きが必要。在留カード・パスポートを持参。窓口で「転入届を出したいのですが」と伝える。手続き後に住民票が発行される。',id:'Wajib daftar dalam 14 hari setelah pindah. Bawa kartu tinggal dan paspor. Katakan di loket "Tennyuu-todoke wo dashitai no desu ga". Setelah proses, surat keterangan domisili diterbitkan.'},
       example:{ja:'「転入届を出したいのですが。」',id:'"Saya ingin mendaftar pindah masuk."'}},
      {ja:'転出届',kana:'てんしゅつとどけ',id:'Pendaftaran pindah keluar (tenshutsu-todoke)',
       detail:{ja:'引越し前に旧住所の市役所に提出する書類。引越し14日前から手続き可能。',id:'Dokumen yang diserahkan ke kantor kota alamat lama sebelum pindah. Bisa diproses 14 hari sebelum pindah.'},
       example:{ja:'「転出届を出したいのですが。」',id:'"Saya ingin mendaftar pindah keluar."'}},
      {ja:'マイナンバーカード',kana:'まいなんばーかーど',id:'Kartu My Number (kartu identitas Jepang)',
       detail:{ja:'日本の個人番号カード。住民票登録後に申請可能。銀行口座・行政手続きなどで必要になることが増えている。申請から受取まで約1ヶ月。',id:'Kartu nomor identitas Jepang. Bisa diajukan setelah daftar penduduk. Makin sering diperlukan untuk rekening bank dan urusan administrasi. Butuh sekitar 1 bulan.'},
       example:{ja:'「マイナンバーカードの申請をしたいのですが。」',id:'"Saya ingin mengajukan kartu My Number."'}},
      {ja:'住民票',kana:'じゅうみんひょう',id:'Surat keterangan domisili (juminhyo)',
       detail:{ja:'住所・氏名・生年月日などが記載された証明書。銀行口座開設・各種手続きで必要になる。窓口またはコンビニのマルチコピー機で取得できる。',id:'Sertifikat yang mencantumkan alamat, nama, tanggal lahir, dll. Diperlukan untuk buka rekening bank dan berbagai urusan. Bisa didapat di loket atau mesin fotokopi di konbini.'},
       example:{ja:'「住民票を1通ください。」',id:'"Tolong satu lembar surat keterangan domisili."'}}
    ]},
    {id:'5-2',label:{ja:'郵便局',id:'Kantor Pos (Yuubinkyoku)'},type:'facility',items:[
      {ja:'ゆうちょ口座開設',kana:'ゆうちょこうざかいせつ',id:'Buka rekening Yuucho Bank',
       detail:{ja:'在留カード・パスポートが必要。通帳とキャッシュカードが発行される。ATMは全国のコンビニ・郵便局にあり便利。給与振込先として使用できる。',id:'Perlu kartu tinggal dan paspor. Diterbitkan buku tabungan dan kartu ATM. ATM ada di konbini dan kantor pos seluruh Jepang. Bisa untuk penerima gaji.'},
       example:{ja:'「口座を開設したいのですが。」',id:'"Saya ingin membuka rekening."'}},
      {ja:'不在票が届いたら',kana:'ふざいひょうがとどいたら',id:'Jika ada slip ketidakhadiran (fuzai-hyo)',
       detail:{ja:'①ネットで再配達申込み（郵便局ウェブサイト）②電話：0120-23-28-86③最寄りの郵便局窓口で直接受取り（身分証持参）。荷物は7日間保管される。',id:'①Pesan ulang lewat internet (website kantor pos) ②Telepon: 0120-23-28-86 ③Ambil langsung di kantor pos terdekat (bawa ID). Paket disimpan 7 hari.'},
       example:{ja:'「不在票が届いたのですが、再配達をお願いしたいです。」',id:'"Ada slip ketidakhadiran, saya ingin pesan ulang pengiriman."'}},
      {ja:'レターパック',kana:'れたーぱっく',id:'Letter Pack (amplop pengiriman khusus)',
       detail:{ja:'青（ライト）¥370：A4サイズ・4kg以内・追跡あり・ポスト投函OK。赤（プラス）¥520：A4サイズ・4kg以内・対面受取・サイン必要。',id:'Biru (Light) ¥370: A4, maks 4kg, ada tracking, bisa di kotak pos. Merah (Plus) ¥520: A4, maks 4kg, terima langsung, perlu tanda tangan.'},
       example:{ja:'「レターパックライトを1枚ください。」',id:'"Tolong satu Letter Pack Light."'}},
      {ja:'国際送金',kana:'こくさいそうきん',id:'Transfer uang internasional (pengiriman ke Indonesia)',
       detail:{ja:'郵便局・銀行・コンビニATM（ゆうちょ）・送金アプリ（Wise・Remitly）などで送金可能。手数料・レートを比較して選ぶ。',id:'Bisa transfer lewat kantor pos, bank, ATM konbini (Yuucho), atau aplikasi transfer (Wise, Remitly). Bandingkan biaya dan kurs sebelum memilih.'},
       example:{ja:'「インドネシアに送金したいのですが。」',id:'"Saya ingin transfer uang ke Indonesia."'}}
    ]},
    {id:'5-3',label:{ja:'入国管理局（イミグレーション）',id:'Imigrasi (Nyuukoku Kanrikyoku)'},type:'facility',items:[
      {ja:'在留カード更新',kana:'ざいりゅうかーどこうしん',id:'Perpanjangan kartu tinggal (Zairyu Card)',
       detail:{ja:'在留期限の3ヶ月前から更新手続きが可能。最寄りの入国管理局に行く。パスポート・在留カード・証明写真・申請書が必要。',id:'Bisa perpanjang 3 bulan sebelum masa berlaku habis. Datang ke kantor imigrasi terdekat. Perlu paspor, kartu tinggal, foto, dan formulir permohonan.'},
       example:{ja:'「在留カードの更新をしたいのですが。」',id:'"Saya ingin memperpanjang kartu tinggal."'}},
      {ja:'住所変更届',kana:'じゅうしょへんこうとどけ',id:'Laporan perubahan alamat',
       detail:{ja:'引越し後14日以内に在留カードの住所変更届を市役所に提出する義務がある。在留カードに新住所が記載される。',id:'Wajib melaporkan perubahan alamat pada kartu tinggal ke kantor kota dalam 14 hari setelah pindah. Alamat baru akan dicantumkan di kartu tinggal.'},
       example:{ja:'「住所変更の届け出をしたいのですが。」',id:'"Saya ingin melaporkan perubahan alamat."'}}
    ]},
    {id:'5-4',label:{ja:'病院・クリニック',id:'Rumah Sakit & Klinik'},type:'facility',items:[

/* ── FIX HEADER HEIGHT ── */
function adjustPadding(){
  var h=document.getElementById('header').offsetHeight;
  document.getElementById('main').style.paddingTop=(h+12)+'px';
}
window.addEventListener('load',adjustPadding);
window.addEventListener('resize',adjustPadding);

/* ── HELPERS ── */
function setPart(p,btn){
  part=p; q='';
  document.getElementById('si').value='';
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  window.scrollTo(0,0);
  render();
}
function doSearch(v){
  q=v.trim().toLowerCase();
  part='all';
  document.querySelectorAll('.nb').forEach(function(b,i){b.classList.toggle('on',i===0);});
  render();
}
function hl(t,query){
  if(!query||!t) return t||'';
  return t.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');
}
function matches(item,query){
  if(!query) return true;
  return['ja','kana','id'].some(function(k){return(item[k]||'').toLowerCase().includes(query);});
}

/* ── MODAL ── */
function openModal(idx){
  var item=window._items[idx];
  var type=window._types[idx];

  document.getElementById('m-hdr').innerHTML=
    '<button class="m-close" onclick="closeModal()">✕</button>'+
    '<div class="m-ja">'+(item.ja||'')+'</div>'+
    (item.kana?'<div class="m-kana">'+item.kana+'</div>':'')+
    '<div class="m-id">'+(item.id||'')+'</div>';

  var body='';
  if(item.detail){
    body+='<div>'+
      '<div class="m-label">解説</div>'+
      '<div class="m-val m-val-ja">'+item.detail.ja+'</div>'+
      '<div class="m-label" style="margin-top:10px">Penjelasan</div>'+
      '<div class="m-val">'+item.detail.id+'</div>'+
      '</div>';
  }
  if(item.example){
    body+='<div><div class="m-label">例文 / Contoh kalimat</div>'+
      '<div class="m-ex">'+
      '<div class="m-ex-ja">'+item.example.ja+'</div>'+
      '<div class="m-ex-id">'+item.example.id+'</div>'+
      '</div></div>';
  }
  if(type==='bulletin'&&item.panels){
    var all=['今月の安全目標','無災害記録表','安全施工サイクル','玉掛けワイヤー点検','建設業許可票','労災保険成立票','有資格者一覧表','3-3-3運動'];
    body+='<div><div class="m-label">掲示板上の位置 / Posisi di papan</div>'+
      '<div class="pgrid">'+
      all.map(function(p){
        var act=item.panels&&item.panels.includes(p);
        return '<div class="pcell" style="background:'+(act?item.color+'22':'#f4f5f8')+
          ';color:'+(act?item.color:'#888')+
          ';border-color:'+(act?item.color:'transparent')+
          ';font-weight:'+(act?'700':'400')+'">'+p+'</div>';
      }).join('')+'</div></div>';
  }
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('modal-bg').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('show');
  document.body.style.overflow='';
}
function closeIfOut(e){
  if(e.target===document.getElementById('modal-bg')) closeModal();
}

/* ── RENDER ── */
function render(){
  var parts=part==='all'?DB.parts:DB.parts.filter(function(p){return p.id===part;});
  var html='', total=0;
  window._items=[];
  window._types=[];

  parts.forEach(function(pt){
    var secHtml='';
    pt.sections.forEach(function(sec){
      var rows='';
      (sec.items||[]).forEach(function(item){
        if(!matches(item,q)) return;
        var idx=window._items.length;
        window._items.push(item);
        window._types.push(sec.type);
        total++;
        if(sec.type==='glossary'){
          rows+='<div class="row" onclick="openModal('+idx+')">'+
            '<div class="rl">'+
            '<div class="rja">'+hl(item.ja,q)+'</div>'+
            (item.kana?'<span class="rkana">'+hl(item.kana,q)+'</span>':'')+
            '<span class="rid">'+hl(item.id,q)+'</span>'+
            '</div><div class="rarr">›</div></div>';
        } else if(sec.type==='phrases'){
          rows+='<div class="row prow" onclick="openModal('+idx+')">'+
            '<div class="pja">'+hl(item.ja,q)+'</div>'+
            '<div class="pid">'+hl(item.id,q)+'</div>'+
            '<div class="parr">詳細 ›</div></div>';
        } else if(sec.type==='bulletin'){
          rows+='<div class="row brow" onclick="openModal('+idx+')">'+
            '<div class="bicon" style="background:'+item.color+'22">'+item.emoji+'</div>'+
            '<div class="rl">'+
            '<div class="bname-ja">'+hl(item.ja,q)+'</div>'+
            '<div class="bname-id">'+hl(item.id,q)+'</div>'+
            '</div><div class="rarr">›</div></div>';
        } else if(sec.type==='facility'){
          rows+='<div class="row prow" onclick="openModal('+idx+')">'+
            '<div class="pja">'+hl(item.ja,q)+'</div>'+
            '<div class="pid">'+hl(item.id,q)+'</div>'+
            '<div class="parr">詳細 ›</div></div>';
        }
      });
      if(!rows) return;
      var ml=sec.label.ja;
      var sl=sec.label.id;
      secHtml+='<div class="sec-card">'+
        '<div class="sec-head">'+
        '<span class="sec-num">'+sec.id+'</span>'+
        '<div><span class="sec-lbl">'+ml+'</span>'+
        '<span class="sec-sub">'+sl+'</span></div>'+
        '</div>'+rows+'</div>';
    });
    if(!secHtml) return;
    if(part==='all'){
      var pl=pt.label.ja;
      var ps=pt.label.id;
      html+='<div class="part-hdr">'+
        '<span class="pbadge" style="background:'+pt.color+'">'+pt.id.toUpperCase()+'</span>'+
        '<div><div class="ptitle">'+pl+'</div><div class="psub">'+ps+'</div></div>'+
        '</div>';
    }
    html+=secHtml;
    if(part==='all') html+='<div class="pdiv"></div>';
  });

  if(!html) html='<div class="empty">「'+q+'」の結果なし<br>Tidak ada hasil untuk "'+q+'"</div>';
  document.getElementById('main').innerHTML=html;
  document.getElementById('scnt').textContent=q?total+' 件':'';
  adjustPadding();
}

render();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/sw.js');
  });
