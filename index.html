
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2B4EA8">
<title>施工管理補助ハンドブック | Legacy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2B4EA8;
  --blue-dk:#1e3a80;
  --yellow:#F5C418;
  --text:#1a1a2e;
  --text2:#555566;
  --text3:#999aaa;
  --bg:#f4f5f8;
  --card:#ffffff;
  --border:#e5e6ed;
  --radius:12px;
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  overflow-x:hidden;
}

/* ── HEADER (fixed) ── */
#header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  background:var(--blue);
  max-width:480px;
  margin:0 auto;
}
.hdr-inner{padding:12px 16px 10px}
.hdr-top{display:flex;align-items:center;margin-bottom:8px}
.logo{display:flex;align-items:center}
.bars{display:flex;flex-direction:column;gap:2.5px}
.bar{height:3px;width:20px;border-radius:1px}
.b1,.b3{background:#fff}.b2{background:var(--yellow)}
.logo-t{font-size:14px;font-weight:700;color:#fff;letter-spacing:.1em}
.hdr h1{font-size:15px;font-weight:700;color:#F5C418;line-height:1.35}
.hdr p{font-size:11px;color:#F5C418;opacity:.85;margin-top:2px}
.srch-wrap{background:rgba(255,255,255,.12);margin:8px 16px 0;border-radius:8px;display:flex;align-items:center;gap:8px;padding:8px 12px}
.srch-wrap svg{opacity:.6;flex-shrink:0}
.srch-wrap input{border:none;outline:none;font-size:14px;color:#fff;background:transparent;flex:1;font-family:inherit}
.srch-wrap input::placeholder{color:rgba(255,255,255,.5)}
#scnt{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap}
.nav-wrap{background:var(--blue-dk);border-top:1px solid rgba(255,255,255,.1);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px}
.nav-wrap::-webkit-scrollbar{display:none}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;color:rgba(255,255,255,.6);padding:8px 13px 7px;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;border-top:none;border-left:none;border-right:none;background:transparent;font-family:inherit}
.nb-ja{font-size:12px;font-weight:700;line-height:1.2}
.nb-id{font-size:10px;font-weight:400;line-height:1.2;opacity:.8}
.nb.on{color:#fff;border-bottom-color:var(--yellow)}
.nb.on .nb-id{opacity:1}

/* ── MAIN SCROLL AREA ── */
#main{
  max-width:480px;
  margin:0 auto;
  padding:12px 14px 40px;
  padding-top:0; /* set by JS */
}

.part-hdr{display:flex;align-items:center;gap:9px;padding:14px 0 6px}
.pbadge{color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}
.ptitle{font-size:15px;font-weight:700;color:var(--text)}
.psub{font-size:11px;color:var(--text3)}
.pdiv{height:1px;background:var(--border);margin:8px 0}

.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.sec-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-num{font-size:10px;color:var(--text3);min-width:26px;flex-shrink:0;font-weight:600}
.sec-lbl{font-size:13px;font-weight:700;color:var(--text)}
.sec-sub{font-size:10px;color:var(--text3);display:block;margin-top:1px;font-weight:400}

.row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;transition:background .12s;-webkit-user-select:none;user-select:none}
.row:last-child{border-bottom:none}
.row:active{background:#f0f2f8}
.rl{flex:1;min-width:0}
.rja{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.rkana{font-size:11px;color:var(--text3);display:block;margin-top:2px}
.rid{font-size:13px;color:var(--text2);display:block;margin-top:3px;line-height:1.35}
.rarr{font-size:18px;color:var(--text3);flex-shrink:0}
.prow{flex-direction:column;align-items:flex-start;gap:3px}
.pja{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.pid{font-size:13px;color:var(--text2);line-height:1.4}
.parr{align-self:flex-end;font-size:12px;color:var(--text3)}
.brow{gap:12px}
.bicon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.bname-ja{font-size:14px;font-weight:700;color:var(--text)}
.bname-id{font-size:12px;color:var(--text2);margin-top:2px}
.hl{background:#ffe066;color:#1a2f6a;border-radius:2px;padding:0 2px}
.empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:14px;line-height:1.8}

/* ── MODAL ── */
#modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,20,40,.55);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
}
#modal-bg.show{display:flex}
#modal-box{
  background:#fff;
  border-radius:16px;
  width:100%;
  max-width:440px;
  max-height:82vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:pop .18s ease;
}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.m-hdr{padding:18px 16px 14px;border-bottom:1px solid #eee;position:relative;flex-shrink:0;background:#fff}
.m-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  border:1px solid #dde;background:#f4f5f8;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#777;font-family:inherit;line-height:1
}
.m-ja{font-size:21px;font-weight:800;color:var(--text);line-height:1.25;padding-right:40px}
.m-kana{font-size:13px;color:var(--text3);margin-top:4px;font-weight:400}
.m-id{font-size:16px;color:var(--blue);font-weight:700;margin-top:6px}
.m-body{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;background:#fff;-webkit-overflow-scrolling:touch}
.m-label{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.m-val{font-size:14px;color:var(--text);line-height:1.75}
.m-val-ja{color:var(--text2);font-size:13px;line-height:1.7;padding-bottom:2px}
.m-ex{background:#f4f5f8;border-radius:10px;padding:13px 14px;border-left:3px solid var(--blue)}
.m-ex-ja{font-size:14px;color:var(--text);line-height:1.5;font-style:italic;font-weight:500}
.m-ex-id{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.pcell{border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.3;border:1.5px solid transparent;font-weight:500}

.loading-screen{position:fixed;inset:0;background:#2B4EA8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{height:40px;margin-bottom:24px}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.loading-bar-inner{height:100%;background:#F5C418;border-radius:99px;animation:loadbar 1.2s ease-in-out infinite}
@keyframes loadbar{0%{width:0%}60%{width:80%}100%{width:100%}}
.loading-text{font-size:12px;color:rgba(255,255,255,.6);margin-top:12px;font-family:-apple-system,sans-serif}
.announce-banner{background:#F5C418;padding:10px 16px;font-size:13px;font-weight:500;color:#1a2f6a;cursor:pointer}
.announce-banner:empty{display:none}
.offline-bar{background:#e65100;color:#fff;font-size:11px;padding:6px 14px;text-align:center;display:none}
.offline-bar.show{display:block}
</style>
</head>

const CACHE_TIME_KEY = 'legacy_hb_cache_time';
const CACHE_TTL = 1000 * 60 * 30; // 30分

let allData = [];

window._types = [];

const PART_META = {
  p1: {color:'#0F6E56', label_ja:'安全衛生・現場ルール', label_id:'Keselamatan & Aturan Lapangan'},
  p2: {color:'#BA7517', label_ja:'職場・労働契約', label_id:'Tempat Kerja & Kontrak'},
  p3: {color:'#D85A30', label_ja:'建設工事用語', label_id:'Istilah Pekerjaan Konstruksi'},
  p4: {color:'#534AB7', label_ja:'作業動詞・測定・その他', label_id:'Kata Kerja, Pengukuran & Lainnya'},
  p5: {color:'#0d47a1', label_ja:'安全掲示板', label_id:'Papan Pengumuman Keselamatan'},
  p6: {color:'#534AB7', label_ja:'現場での会話集', label_id:'Percakapan di Lapangan'},
  p7: {color:'#3B6D11', label_ja:'日本での生活ガイド', label_id:'Panduan Hidup di Jepang'},
};

// Offline detection

if(!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

// Load data
async function loadData() {
  // Try cache first
  const cached = localStorage.getItem(CACHE_KEY);
  const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
  const isFresh = cachedTime && (Date.now() - parseInt(cachedTime)) < CACHE_TTL;

  if(cached && isFresh) {
    allData = JSON.parse(cached);
    buildAndRender();
    hideLoading();
    return;
  }

  // Fetch from Supabase
  try {
    const { data, error } = await sb.from('terms')
      .select('*')
      .eq('is_active', true)
      .order('part_id')
      .order('section_id')
      .order('sort_order');

    if(error || !data || data.length === 0) {
      // If DB empty, show message
      if(cached) {
        allData = JSON.parse(cached);
        buildAndRender();
      } else {
        document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center;color:#999;font-size:14px">データを読み込めませんでした<br>Gagal memuat data</div>';
      }
    } else {
      allData = data;
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
      buildAndRender();
    }
  } catch(e) {
    if(cached) {
      allData = JSON.parse(cached);
      buildAndRender();
    }
  }
  hideLoading();
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('hide');
  setTimeout(() => el.style.display = 'none', 400);
}

function buildAndRender() {
  // Build parts structure from flat data
  const partsMap = {};
  allData.forEach(item => {
    const pid = item.part_id;
    if(!partsMap[pid]) partsMap[pid] = {};
    const sid = item.section_id;
    if(!partsMap[pid][sid]) partsMap[pid][sid] = {
      id: sid,
      label: {ja: item.section_label_ja || sid, id: item.section_label_id || sid},
      type: item.type || 'glossary',
      items: []
    };
    partsMap[pid][sid].items.push(item);
  });

  parts = Object.keys(partsMap).sort().map(pid => ({
    id: pid,
    color: PART_META[pid]?.color || '#888',
    label: {ja: PART_META[pid]?.label_ja || pid, id: PART_META[pid]?.label_id || pid},
    sections: Object.values(partsMap[pid])
  }));

  buildNav();
  render();
}

function buildNav() {
  const nav = document.getElementById('nav-wrap');
  let html = '<button class="nb on" onclick="setPart('all',this)"><span class="nb-ja">すべて</span><span class="nb-id">Semua</span></button>';
  const NAV_LABELS = {
    p1:{ja:'安全',id:'Safety'},
    p2:{ja:'職場',id:'Kerja'},
    p3:{ja:'建設',id:'Konstruksi'},
    p4:{ja:'動詞・測定',id:'Kata Kerja'},
    p5:{ja:'掲示板',id:'Papan'},
    p6:{ja:'会話',id:'Percakapan'},
    p7:{ja:'生活',id:'Hidup'},
  };
  parts.forEach(p => {
    const lbl = NAV_LABELS[p.id] || {ja:p.id,id:p.id};
    html += `<button class="nb" onclick="setPart('${p.id}',this)"><span class="nb-ja">${lbl.ja}</span><span class="nb-id">${lbl.id}</span></button>`;
  });
  nav.innerHTML = html;
  adjustPadding();
}

// Announcements
async function loadAnnouncements() {
  const { data } = await sb.from('announcements').select('*').eq('is_active', true).order('created_at', {ascending:false}).limit(1);
  if(data && data.length > 0) {
    const a = data[0];
    const dismissed = localStorage.getItem('dismissed_announce_' + a.id);
    if(!dismissed) {
      document.getElementById('announce-banner').textContent = '📢 ' + a.title_ja + (a.title_id ? ' / ' + a.title_id : '');
      document.getElementById('announce-banner').dataset.id = a.id;
      adjustPadding();
    }
  }
}

function closeAnnounce() {
  const el = document.getElementById('announce-banner');
  const id = el.dataset.id;
  if(id) localStorage.setItem('dismissed_announce_' + id, '1');
  el.textContent = '';
  adjustPadding();
}

function adjustPadding() {
  const h = document.getElementById('header').offsetHeight;
  document.getElementById('main').style.paddingTop = (h + 12) + 'px';
}
window.addEventListener('load', adjustPadding);
window.addEventListener('resize', adjustPadding);

function setPart(p_val, btn) {
  part = p_val; q = '';
  document.getElementById('si').value = '';
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  window.scrollTo(0, 0);
  render();
}

function doSearch(v) {
  q = v.trim().toLowerCase();
  part = 'all';
  document.querySelectorAll('.nb').forEach((b,i) => b.classList.toggle('on', i===0));
  render();
}

function hl(t, query) {
  if(!query||!t) return t||'';
  return t.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');
}

function matches(item, query) {
  if(!query) return true;
  return ['ja','kana','id_trans'].some(k => (item[k]||'').toLowerCase().includes(query));
}

function openModal(idx) {
  const item = window._items[idx];
  const type = window._types[idx];
  document.getElementById('m-hdr').innerHTML =
    '<button class="m-close" onclick="closeModal()">✕</button>' +
    '<div class="m-ja">' + (item.ja||'') + '</div>' +
    (item.kana ? '<div class="m-kana">' + item.kana + '</div>' : '') +
    '<div class="m-id">' + (item.id_trans||'') + '</div>';

  let body = '';
  if(item.detail_ja || item.detail_id) {
    body += '<div><div class="m-label">解説</div><div class="m-val m-val-ja">' + (item.detail_ja||'') + '</div>' +
      (item.detail_id ? '<div class="m-label" style="margin-top:10px">Penjelasan</div><div class="m-val">' + item.detail_id + '</div>' : '') + '</div>';
  }
  if(item.example_ja || item.example_id) {
    body += '<div><div class="m-label">例文 / Contoh kalimat</div>' +
      '<div class="m-ex"><div class="m-ex-ja">' + (item.example_ja||'') + '</div>' +
      '<div class="m-ex-id">' + (item.example_id||'') + '</div></div></div>';
  }
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('modal-bg').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('show');
  document.body.style.overflow = '';
}
function closeIfOut(e) { if(e.target===document.getElementById('modal-bg')) closeModal(); }

function render() {
  const filteredParts = part==='all' ? parts : parts.filter(p => p.id===part);
  let html = '', total = 0;
  window._items = [];
  window._types = [];

  filteredParts.forEach(pt => {
    let secHtml = '';
    pt.sections.forEach(sec => {
      let rows = '';
      (sec.items||[]).forEach(item => {
        if(!matches(item, q)) return;
        const idx = window._items.length;
        window._items.push(item);
        window._types.push(sec.type);
        total++;
        if(sec.type==='glossary'||sec.type==='facility') {
          rows += '<div class="row" onclick="openModal('+idx+')">' +
            '<div class="rl"><div class="rja">' + hl(item.ja,q) + '</div>' +
            (item.kana ? '<span class="rkana">' + hl(item.kana,q) + '</span>' : '') +
            '<span class="rid">' + hl(item.id_trans,q) + '</span></div>' +
            '<div class="rarr">›</div></div>';
        } else if(sec.type==='phrases') {
          rows += '<div class="row prow" onclick="openModal('+idx+')">' +
            '<div class="pja">' + hl(item.ja,q) + '</div>' +
            '<div class="pid">' + hl(item.id_trans,q) + '</div>' +
            '<div class="parr">詳細 ›</div></div>';
        } else if(sec.type==='bulletin') {
          const color = item.detail_ja ? '#0d47a1' : '#888';
          rows += '<div class="row brow" onclick="openModal('+idx+')">' +
            '<div class="bicon" style="background:'+color+'22">📋</div>' +
            '<div class="rl"><div class="bname-ja">' + hl(item.ja,q) + '</div>' +
            '<div class="bname-id">' + hl(item.id_trans,q) + '</div></div>' +
            '<div class="rarr">›</div></div>';
        }
      });
      if(!rows) return;
      secHtml += '<div class="sec-card"><div class="sec-head">' +
        '<span class="sec-num">' + sec.id + '</span>' +
        '<div><span class="sec-lbl">' + sec.label.ja + '</span>' +
        '<span class="sec-sub">' + sec.label.id + '</span></div>' +
        '</div>' + rows + '</div>';
    });
    if(!secHtml) return;
    if(part==='all') {
      html += '<div class="part-hdr"><span class="pbadge" style="background:'+pt.color+'">' + pt.id.toUpperCase() + '</span>' +
        '<div><div class="ptitle">' + pt.label.ja + '</div><div class="psub">' + pt.label.id + '</div></div></div>';
    }
    html += secHtml;
    if(part==='all') html += '<div class="pdiv"></div>';
  });

  if(!html) html = '<div class="empty">「'+q+'」の結果なし<br>Tidak ada hasil untuk "'+q+'"</div>';
  document.getElementById('main').innerHTML = html;
  document.getElementById('scnt').textContent = q ? total + ' 件' : '';
  adjustPadding();
}

// Init
loadData();
loadAnnouncements();

if('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
